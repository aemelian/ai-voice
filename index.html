<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Owl">
  <title>Owl</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(160deg, #dff2ff 0%, #e8f7e8 50%, #fff5e8 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      pointer-events: none;
    }
    .blob-1 { width: 300px; height: 300px; background: #c9a6f5; top: -80px; right: -60px; }
    .blob-2 { width: 250px; height: 250px; background: #a8e6a3; bottom: -60px; left: -40px; }
    .blob-3 { width: 200px; height: 200px; background: #ffd97d; bottom: 80px; right: 20px; }

    /* ── START SCREEN ── */
    #startScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding: 48px 32px;
      text-align: center;
      animation: fadeUp 0.5s ease both;
    }

    #startScreen h1 {
      font-size: 36px;
      font-weight: 800;
      color: #2d3a4a;
    }

    #startScreen p {
      font-size: 18px;
      color: #5a7080;
      max-width: 280px;
      line-height: 1.5;
    }

    #startBtn {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #c9a6f5, #89c4f4);
      cursor: pointer;
      box-shadow: 0 12px 40px rgba(137,196,244,0.5);
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #startBtn:active { transform: scale(0.94); }

    /* ── MAIN SCREEN ── */
    #mainScreen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 48px 28px;
      text-align: center;
      width: 100%;
      max-width: 440px;
    }

    /* ── OWL ── */
    .owl-wrap {
      position: relative;
      width: 210px;
      height: 220px;
    }

    #owlDiv {
      width: 210px;
      height: 220px;
      transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }

    #owlDiv.listening { animation: listenPulse 2s ease-in-out infinite; }
    #owlDiv.thinking  { animation: thinkNod 0.9s ease-in-out infinite; }
    #owlDiv.speaking  { animation: speakBounce 0.32s ease-in-out infinite alternate; }

    /* Owl fill classes — controlled by JS */
    .ob  { transition: fill 0.4s; }
    .ow  { transition: fill 0.4s; }
    .of  { transition: fill 0.4s; }
    .obe { transition: fill 0.4s; }
    .oi  { transition: fill 0.4s; }
    .obk { transition: fill 0.4s; }

    /* Ripple */
    .ripple {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 2.5px solid rgba(140,90,220,0.35);
      opacity: 0;
      pointer-events: none;
    }
    #owlDiv.listening ~ .r1 { animation: rippleOut 2.2s ease-out 0s infinite; }
    #owlDiv.listening ~ .r2 { animation: rippleOut 2.2s ease-out 0.7s infinite; }
    #owlDiv.listening ~ .r3 { animation: rippleOut 2.2s ease-out 1.4s infinite; }

    @keyframes rippleOut {
      0%   { transform: scale(1);   opacity: 0.55; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    @keyframes listenPulse {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.06); }
    }
    @keyframes thinkNod {
      0%,100% { transform: rotate(-6deg); }
      50%     { transform: rotate(6deg); }
    }
    @keyframes speakBounce {
      from { transform: scale(1) translateY(0); }
      to   { transform: scale(1.07) translateY(-5px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #statusLabel {
      font-size: 24px;
      font-weight: 800;
      color: #2d3a4a;
      min-height: 36px;
    }

    #transcriptBox {
      font-size: 15px;
      font-weight: 600;
      color: #5a7080;
      font-style: italic;
      min-height: 22px;
      max-width: 320px;
    }

    #responseBox {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      border-radius: 22px;
      padding: 20px 26px;
      font-size: 19px;
      font-weight: 700;
      color: #2d3a4a;
      max-width: 360px;
      min-height: 80px;
      line-height: 1.6;
      border: 2px solid rgba(255,255,255,0.85);
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #errorBox {
      font-size: 14px;
      font-weight: 700;
      color: #c0392b;
      background: rgba(255,200,200,0.6);
      padding: 10px 18px;
      border-radius: 14px;
      max-width: 340px;
      text-align: center;
      display: none;
      word-break: break-word;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- START SCREEN -->
  <div id="startScreen">
    <h1>Hi Kit! 🌟</h1>
    <p>Tap the owl to start talking!</p>
    <button id="startBtn" onclick="begin()">
      <svg viewBox="0 0 200 215" width="140" height="150" xmlns="http://www.w3.org/2000/svg">
        <polygon points="68,68 56,22 86,60" fill="#7040b8"/>
        <polygon points="132,68 144,22 114,60" fill="#7040b8"/>
        <ellipse cx="40" cy="142" rx="27" ry="54" transform="rotate(-12,40,142)" fill="#5c30b0"/>
        <ellipse cx="160" cy="142" rx="27" ry="54" transform="rotate(12,160,142)" fill="#5c30b0"/>
        <ellipse cx="100" cy="135" rx="60" ry="66" fill="#9b6fe0"/>
        <circle cx="100" cy="82" r="52" fill="#9b6fe0"/>
        <ellipse cx="100" cy="148" rx="34" ry="44" fill="#e8d8fc"/>
        <ellipse cx="100" cy="86" rx="42" ry="38" fill="#c9a6f5"/>
        <circle cx="81" cy="78" r="18" fill="white"/>
        <circle cx="119" cy="78" r="18" fill="white"/>
        <circle cx="81" cy="78" r="12" fill="#5c30b0"/>
        <circle cx="119" cy="78" r="12" fill="#5c30b0"/>
        <circle cx="81" cy="78" r="6" fill="#111827"/>
        <circle cx="119" cy="78" r="6" fill="#111827"/>
        <circle cx="77" cy="73" r="3.5" fill="white" opacity="0.9"/>
        <circle cx="115" cy="73" r="3.5" fill="white" opacity="0.9"/>
        <polygon points="100,91 91,106 109,106" fill="#f5c84a"/>
        <rect x="76" y="196" width="9" height="13" rx="4" fill="#5c30b0"/>
        <rect x="66" y="203" width="20" height="6" rx="3" fill="#5c30b0"/>
        <rect x="115" y="196" width="9" height="13" rx="4" fill="#5c30b0"/>
        <rect x="105" y="203" width="20" height="6" rx="3" fill="#5c30b0"/>
      </svg>
    </button>
  </div>

  <!-- MAIN SCREEN -->
  <div id="mainScreen">
    <div class="owl-wrap">
      <div id="owlDiv" class="listening">
        <svg id="owlSvg" viewBox="0 0 200 215" width="210" height="220" xmlns="http://www.w3.org/2000/svg">
          <polygon points="68,68 56,22 86,60" class="ow"/>
          <polygon points="132,68 144,22 114,60" class="ow"/>
          <ellipse cx="40" cy="142" rx="27" ry="54" transform="rotate(-12,40,142)" class="ow"/>
          <ellipse cx="160" cy="142" rx="27" ry="54" transform="rotate(12,160,142)" class="ow"/>
          <ellipse cx="100" cy="135" rx="60" ry="66" class="ob"/>
          <circle cx="100" cy="82" r="52" class="ob"/>
          <ellipse cx="100" cy="148" rx="34" ry="44" class="obe"/>
          <ellipse cx="100" cy="86" rx="42" ry="38" class="of"/>
          <circle cx="81" cy="78" r="18" fill="white"/>
          <circle cx="119" cy="78" r="18" fill="white"/>
          <circle cx="81" cy="78" r="12" class="oi"/>
          <circle cx="119" cy="78" r="12" class="oi"/>
          <circle cx="81" cy="78" r="6" fill="#111827"/>
          <circle cx="119" cy="78" r="6" fill="#111827"/>
          <circle cx="77" cy="73" r="3.5" fill="white" opacity="0.9"/>
          <circle cx="115" cy="73" r="3.5" fill="white" opacity="0.9"/>
          <polygon points="100,91 91,106 109,106" class="obk"/>
          <rect x="76" y="196" width="9" height="13" rx="4" class="ow"/>
          <rect x="66" y="203" width="20" height="6" rx="3" class="ow"/>
          <rect x="115" y="196" width="9" height="13" rx="4" class="ow"/>
          <rect x="105" y="203" width="20" height="6" rx="3" class="ow"/>
        </svg>
      </div>
      <div class="ripple r1"></div>
      <div class="ripple r2"></div>
      <div class="ripple r3"></div>
    </div>

    <div id="statusLabel">Listening...</div>
    <div id="transcriptBox"></div>
    <div id="responseBox">Say something!</div>
    <div id="hintLabel" style="font-size:13px;color:#8a9aaa;font-weight:600;min-height:18px;"></div>
    <div id="errorBox"></div>
  </div>

  <script>
    const WORKER = 'https://throbbing-frost-e567.anushka-6ef.workers.dev';

    // Owl color palettes per state
    const COLORS = {
      listening: { ob:'#9b6fe0', ow:'#7040b8', of:'#c9a6f5', obe:'#e8d8fc', oi:'#5c30b0', obk:'#f5c84a' },
      thinking:  { ob:'#e89010', ow:'#b86808', of:'#ffd97d', obe:'#fff4cc', oi:'#904800', obk:'#e04818' },
      speaking:  { ob:'#3a8fd4', ow:'#1e68a8', of:'#89c4f4', obe:'#cce8fa', oi:'#144e90', obk:'#f5d030' },
    };

    let recognition = null;
    let isProcessing = false;
    let conversationHistory = [];
    let restartTimer = null;
    let audioUnlocked = false;

    function begin() {
      // Unlock iOS audio with this user gesture
      const u = new SpeechSynthesisUtterance('');
      speechSynthesis.speak(u);
      audioUnlocked = true;

      document.getElementById('startScreen').style.display = 'none';
      const m = document.getElementById('mainScreen');
      m.style.display = 'flex';

      // Tap owl to interrupt while speaking
      document.getElementById('owlDiv').addEventListener('click', () => {
        if (isProcessing && speechSynthesis.speaking) {
          speechSynthesis.cancel();
          isProcessing = false;
          setOwlState('listening');
          clearTimeout(restartTimer);
          try { recognition.start(); } catch(e) {}
        }
      });

      setOwlState('listening');
      initRecognition();
    }

    // ── OWL STATE ──
    function setOwlState(state) {
      const div = document.getElementById('owlDiv');
      div.className = state;

      const pal = COLORS[state];
      document.querySelectorAll('.ob').forEach(el => el.style.fill = pal.ob);
      document.querySelectorAll('.ow').forEach(el => el.style.fill = pal.ow);
      document.querySelectorAll('.of').forEach(el => el.style.fill = pal.of);
      document.querySelectorAll('.obe').forEach(el => el.style.fill = pal.obe);
      document.querySelectorAll('.oi').forEach(el => el.style.fill = pal.oi);
      document.querySelectorAll('.obk').forEach(el => el.style.fill = pal.obk);

      const labels  = { listening:'Listening...', thinking:'Thinking...', speaking:'Speaking...' };
      const hints   = { listening:'', thinking:'', speaking:'Tap the owl to interrupt' };
      document.getElementById('statusLabel').textContent = labels[state] || '';
      document.getElementById('hintLabel').textContent  = hints[state]  || '';
    }

    // ── SPEECH RECOGNITION ──
    function initRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        showError('Speech recognition not supported. Please use Safari on iPad.');
        return;
      }

      recognition = new SR();
      recognition.continuous = true;
      recognition.interimResults = false;
      recognition.lang = 'en-US';

      recognition.onresult = (e) => {
        if (isProcessing) return;
        const idx = e.results.length - 1;
        if (!e.results[idx].isFinal) return;
        const text = e.results[idx][0].transcript.trim();
        if (text.length < 2) return;
        handleSpeech(text);
      };

      recognition.onend = () => {
        clearTimeout(restartTimer);
        if (!isProcessing) {
          restartTimer = setTimeout(() => { try { recognition.start(); } catch(e){} }, 400);
        }
      };

      recognition.onerror = (e) => {
        if (e.error === 'no-speech' || e.error === 'aborted') return;
        if (e.error === 'not-allowed') {
          showError('Microphone blocked. Go to Settings → Safari → Microphone and allow access.');
          return;
        }
        clearTimeout(restartTimer);
        restartTimer = setTimeout(() => { try { recognition.start(); } catch(e){} }, 1000);
      };

      try { recognition.start(); } catch(e) { showError('Mic error: ' + e.message); }
    }

    // ── HANDLE SPEECH ──
    async function handleSpeech(text) {
      isProcessing = true;
      clearTimeout(restartTimer);
      try { recognition.abort(); } catch(e) {}

      hideError();
      setOwlState('thinking');
      document.getElementById('transcriptBox').textContent = '"' + text + '"';
      document.getElementById('responseBox').textContent = '';

      conversationHistory.push({ role: 'user', content: text });

      try {
        const res = await fetch(WORKER, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 300,
            system: `You are a warm, playful, patient friend talking to a very young child (toddler/preschooler).
- Keep replies SHORT: 1–3 simple sentences only.
- Use easy words a 3-year-old understands.
- Be enthusiastic, kind, and encouraging.
- If they say something silly or unclear, play along warmly.
- Never ask more than one question.
- Sound like a friendly, gentle human, not a robot.`,
            messages: conversationHistory
          })
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error('API error ' + res.status + ': ' + (errData?.error?.message || res.statusText));
        }

        const data = await res.json();
        const reply = data?.content?.[0]?.text;
        if (!reply) throw new Error('Empty reply from Claude');

        conversationHistory.push({ role: 'assistant', content: reply });
        if (conversationHistory.length > 20) conversationHistory = conversationHistory.slice(-16);

        speak(reply);

      } catch(err) {
        showError(err.message || 'Unknown error');
        conversationHistory.pop();
        isProcessing = false;
        setTimeout(() => {
          hideError();
          setOwlState('listening');
          try { recognition.start(); } catch(e) {}
        }, 6000);
      }
    }

    // ── SPEAK ──
    function speak(text) {
      setOwlState('speaking');
      document.getElementById('responseBox').textContent = text;

      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.88;
      u.pitch = 1.15;
      u.volume = 1;

      const voices = speechSynthesis.getVoices();
      const preferred = ['Samantha','Karen','Moira','Tessa','Fiona'];
      for (const name of preferred) {
        const v = voices.find(v => v.name.includes(name));
        if (v) { u.voice = v; break; }
      }

      u.onend = () => {
        isProcessing = false;
        setOwlState('listening');
        restartTimer = setTimeout(() => { try { recognition.start(); } catch(e){} }, 500);
      };
      u.onerror = (e) => {
        showError('Speech error: ' + e.error);
        isProcessing = false;
        setOwlState('listening');
        try { recognition.start(); } catch(e) {}
      };

      speechSynthesis.speak(u);
    }

    function showError(msg) {
      const el = document.getElementById('errorBox');
      el.textContent = msg;
      el.style.display = 'block';
    }
    function hideError() {
      document.getElementById('errorBox').style.display = 'none';
    }

    speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  </script>
</body>
</html>
